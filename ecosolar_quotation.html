<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoSolar — ระบบใบเสนอราคา</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3a5c;
    --accent: #2e7d32;
    --accent-light: #e8f5e9;
    --yellow: #fffde7;
    --yellow-border: #f9a825;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #dde3ea;
    --text: #1a2332;
    --muted: #6b7a8d;
    --danger: #c62828;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', 'IBM Plex Sans Thai', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== FORM SECTION ===== */
  .app-header {
    background: var(--primary);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.2);
  }

  .logo-badge {
    background: #000;
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo-badge span:first-child { color: #4caf50; }
  .logo-badge span:last-child { color: #e0e0e0; }

  .app-header h1 {
    color: #fff;
    font-size: 18px;
    font-weight: 500;
    opacity: 0.9;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #1b5e20; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46,125,50,0.3); }
  .btn-outline {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.4);
  }
  .btn-outline:hover { background: rgba(255,255,255,0.1); }

  .form-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px;
    display: none;
  }
  .form-container.active { display: block; }

  .section-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .section-title {
    background: var(--primary);
    color: #fff;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-body { padding: 20px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.full { grid-template-columns: 1fr; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.span2 { grid-column: span 2; }
  .field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  input, textarea, select {
    font-family: inherit;
    font-size: 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    background: var(--yellow);
    color: var(--text);
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

  /* Items table in form */
  .items-table { width: 100%; border-collapse: collapse; }
  .items-table th {
    background: #f5f7fa;
    padding: 9px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 2px solid var(--border);
    text-align: left;
  }
  .items-table th:nth-child(3),
  .items-table th:nth-child(4),
  .items-table th:nth-child(5),
  .items-table th:nth-child(6) { text-align: right; }

  .items-table td { padding: 8px 6px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  .items-table tr:hover td { background: #fafbfc; }

  .items-table input, .items-table textarea {
    font-size: 13px;
    padding: 7px 9px;
    border-radius: 6px;
  }
  .items-table .num-input { text-align: right; }

  .row-num {
    width: 36px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    margin: auto;
  }

  .del-btn {
    background: none;
    border: none;
    color: #ef5350;
    cursor: pointer;
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .del-btn:hover { background: #ffebee; }

  .add-row-btn {
    margin-top: 12px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1.5px dashed var(--accent);
    border-radius: 8px;
    padding: 9px 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-row-btn:hover { background: #c8e6c9; }

  .col-del { width: 40px; text-align: center; }
  .col-no { width: 40px; text-align: center; }
  .col-desc { min-width: 260px; }
  .col-qty { width: 80px; }
  .col-price { width: 120px; }
  .col-disc { width: 100px; }
  .col-vat { width: 80px; }
  .col-total { width: 130px; }

  .val-cell {
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    padding-right: 10px;
  }

  /* ===== PREVIEW SECTION ===== */
  .preview-container {
    display: none;
    max-width: 800px;
    margin: 0 auto;
    padding: 24px;
  }
  .preview-container.active { display: block; }

  .print-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }

  /* ===== QUOTATION DOCUMENT ===== */
  .quotation {
    background: #fff;
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }

  .q-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--primary);
    padding: 28px 32px;
    gap: 20px;
    align-items: center;
  }

  .q-logo {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }
  .q-logo .eco { color: #66bb6a; }
  .q-logo .solar { color: #e0e0e0; }
  .q-logo-sub {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    margin-top: 4px;
    letter-spacing: 0.3px;
  }

  .q-title-block { text-align: right; }
  .q-title-block h1 {
    color: #fff;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .q-title-block .q-subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    margin-top: 4px;
  }
  .q-meta {
    margin-top: 10px;
    display: flex;
    gap: 20px;
    justify-content: flex-end;
  }
  .q-meta-item { text-align: right; }
  .q-meta-label { color: rgba(255,255,255,0.5); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .q-meta-value { color: #fff; font-size: 13px; font-weight: 600; }

  .q-parties {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 2px solid var(--border);
  }
  .q-party { padding: 20px 28px; }
  .q-party:first-child { border-right: 1px solid var(--border); }
  .q-party-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .q-party-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--accent);
    opacity: 0.3;
  }
  .q-party-name { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .q-party-detail { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .q-table-wrap { padding: 0 28px 0; }

  .q-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  .q-table thead tr {
    background: var(--primary);
  }
  .q-table th {
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 11px 12px;
    text-align: left;
  }
  .q-table th.right { text-align: right; }
  .q-table th.center { text-align: center; }

  .q-table tbody tr:nth-child(even) td { background: #fafbfc; }
  .q-table tbody tr:last-child td { border-bottom: 2px solid var(--primary); }

  .q-table td {
    padding: 12px 12px;
    font-size: 12px;
    border-bottom: 1px solid #eef0f3;
    vertical-align: top;
  }
  .q-table td.center { text-align: center; }
  .q-table td.right { text-align: right; }
  .q-table td.num { font-weight: 600; color: var(--primary); text-align: center; }
  .q-table td.desc-main { font-weight: 600; color: var(--text); line-height: 1.5; white-space: pre-wrap; }

  .q-totals {
    display: flex;
    justify-content: flex-end;
    padding: 20px 28px;
    border-bottom: 2px solid var(--border);
  }
  .q-totals-table { width: 340px; }
  .q-totals-row {
    display: grid;
    grid-template-columns: 1fr auto;
    padding: 7px 12px;
    font-size: 13px;
    border-radius: 6px;
  }
  .q-totals-row:hover { background: #f9fafb; }
  .q-totals-row .t-label { color: var(--muted); }
  .q-totals-row .t-value { font-weight: 600; color: var(--text); text-align: right; min-width: 120px; }
  .q-totals-row.grand {
    background: var(--accent);
    margin-top: 6px;
    border-radius: 8px;
  }
  .q-totals-row.grand .t-label { color: #fff; font-weight: 700; font-size: 14px; }
  .q-totals-row.grand .t-value { color: #fff; font-size: 16px; font-weight: 800; }
  .q-totals-row.net {
    background: var(--primary);
    border-radius: 8px;
    margin-top: 4px;
  }
  .q-totals-row.net .t-label { color: rgba(255,255,255,0.8); font-weight: 700; font-size: 14px; }
  .q-totals-row.net .t-value { color: #fff; font-size: 16px; font-weight: 800; }

  .q-amount-words {
    padding: 0 28px 16px;
    text-align: right;
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
  }

  .q-bottom {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 2px solid var(--border);
  }

  .q-terms { padding: 20px 28px; border-right: 1px solid var(--border); }
  .q-terms h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .q-terms ul { list-style: none; }
  .q-terms ul li {
    font-size: 12px;
    color: var(--muted);
    padding: 3px 0;
    display: flex;
    gap: 6px;
  }
  .q-terms ul li::before { content: '•'; color: var(--accent); font-weight: 700; }

  .q-signatures { padding: 20px 28px; }
  .q-signatures h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .q-sig-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .q-sig { text-align: center; }
  .q-sig-line {
    border-bottom: 1.5px solid #bbb;
    margin-bottom: 6px;
    height: 36px;
  }
  .q-sig-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .q-sig-role { font-size: 11px; color: var(--muted); }
  .q-sig-date { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .q-footer {
    background: var(--primary);
    padding: 12px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .q-footer-brand {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
  }
  .q-footer-thanks {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-style: italic;
  }

  /* ===== PRINT ===== */
  @media print {
    body { background: #fff; }
    .app-header, .print-actions, .form-container { display: none !important; }
    .preview-container { display: block !important; padding: 0; }
    .quotation { border-radius: 0; box-shadow: none; }
    @page { margin: 10mm; size: A4; }
  }

  /* ===== UTILS ===== */
  .badge {
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
  }

  .tab-bar {
    display: flex;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .tab-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: #fff;
    color: var(--primary);
  }

  .fmt-num { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header">
  <div class="logo-badge"><span>Eco</span><span>Solar</span></div>
  <h1>ระบบออกใบเสนอราคา</h1>
  <div class="tab-bar" style="margin-left:24px">
    <button class="tab-btn active" onclick="showTab('form')">📝 กรอกข้อมูล</button>
    <button class="tab-btn" onclick="showTab('preview')" id="previewTab">👁 ดูตัวอย่าง</button>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="resetForm()">🔄 ล้างข้อมูล</button>
    <button class="btn btn-primary" onclick="generateQuotation()">✨ สร้างใบเสนอราคา</button>
  </div>
</header>

<!-- ===== FORM ===== -->
<div class="form-container active" id="formSection">

  <!-- ข้อมูลเอกสาร -->
  <div class="section-card">
    <div class="section-title">📄 ข้อมูลเอกสาร</div>
    <div class="section-body">
      <div class="form-grid cols-3">
        <div class="field">
          <label>เลขที่ใบเสนอราคา</label>
          <input type="text" id="quoteNo" value="QT-2026-001" placeholder="QT-2026-001">
        </div>
        <div class="field">
          <label>วันที่</label>
          <input type="text" id="quoteDate" value="26/5/2569" placeholder="วว/ดด/ปปปป">
        </div>
        <div class="field">
          <label>อายุใบเสนอราคา (วัน)</label>
          <input type="number" id="quoteExpiry" value="30" min="1">
        </div>
      </div>
    </div>
  </div>

  <!-- ข้อมูลบริษัท -->
  <div class="section-card">
    <div class="section-title">🏢 ข้อมูลผู้เสนอราคา (บริษัท)</div>
    <div class="section-body">
      <div class="form-grid">
        <div class="field span2">
          <label>ชื่อบริษัท</label>
          <input type="text" id="sellerName" value="บริษัท พีรพรรฒ 2013 จำกัด (สำนักงานใหญ่)">
        </div>
        <div class="field span2">
          <label>ที่อยู่</label>
          <input type="text" id="sellerAddr" value="19/1 หมู่ 4 ตำบลคลองตัน อำเภอบ้านแพ้ว จังหวัดสมุทรสาคร 74000">
        </div>
        <div class="field">
          <label>เลขผู้เสียภาษี</label>
          <input type="text" id="sellerTax" value="0745556005139">
        </div>
        <div class="field">
          <label>โทรศัพท์</label>
          <input type="text" id="sellerTel" value="097-1185086">
        </div>
      </div>
    </div>
  </div>

  <!-- ข้อมูลลูกค้า -->
  <div class="section-card">
    <div class="section-title">👤 ข้อมูลลูกค้า</div>
    <div class="section-body">
      <div class="form-grid">
        <div class="field span2">
          <label>ชื่อลูกค้า</label>
          <input type="text" id="buyerName" value="คุณเกียรติสถาพร วิโรจน์วิริยะกุล" placeholder="ชื่อ-นามสกุล / ชื่อบริษัท">
        </div>
        <div class="field span2">
          <label>ที่อยู่</label>
          <input type="text" id="buyerAddr" value="79/418 ม.6 ต.พันท้ายนรสิงห์ อ.เมืองสมุทรสาคร จ.สมุทรสาคร" placeholder="ที่อยู่ลูกค้า">
        </div>
      </div>
    </div>
  </div>

  <!-- รายการสินค้า -->
  <div class="section-card">
    <div class="section-title">📦 รายการสินค้า/บริการ <span class="badge" id="itemCount">2 รายการ</span></div>
    <div class="section-body" style="overflow-x:auto">
      <table class="items-table">
        <thead>
          <tr>
            <th class="col-no">#</th>
            <th class="col-desc">รายละเอียด</th>
            <th class="col-qty" style="text-align:right">จำนวน</th>
            <th class="col-price" style="text-align:right">ราคา/หน่วย</th>
            <th class="col-disc" style="text-align:right">ส่วนลด</th>
            <th class="col-vat" style="text-align:center">VAT%</th>
            <th class="col-total" style="text-align:right">มูลค่า</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
      <button class="add-row-btn" onclick="addItem()">＋ เพิ่มรายการ</button>
    </div>
  </div>

  <!-- เงื่อนไข -->
  <div class="section-card">
    <div class="section-title">📋 เงื่อนไขการชำระเงิน</div>
    <div class="section-body">
      <div class="form-grid full">
        <div class="field">
          <label>เงื่อนไข (แต่ละบรรทัด = 1 ข้อ)</label>
          <textarea id="paymentTerms" rows="4">งวดที่ 1: มัดจำ 50% เมื่อตกลงสั่งจ้าง
งวดที่ 2: ชำระส่วนที่เหลือ 50% เมื่อติดตั้งแล้วเสร็จและส่งมอบงาน
ใบเสนอราคามีอายุ 30 วัน นับจากวันที่ออก
ราคานี้รวมภาษีมูลค่าเพิ่ม 7% แล้ว</textarea>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ===== PREVIEW ===== -->
<div class="preview-container" id="previewSection">
  <div class="print-actions">
    <button class="btn btn-primary" onclick="window.print()">🖨️ พิมพ์ / บันทึก PDF</button>
    <button class="btn btn-outline" style="color:var(--primary);border-color:var(--border)" onclick="showTab('form')">← แก้ไขข้อมูล</button>
    <span style="margin-left:auto;font-size:13px;color:var(--muted)">Ctrl+P เพื่อพิมพ์ หรือบันทึกเป็น PDF</span>
  </div>
  <div class="quotation" id="quotationDoc"></div>
</div>

<script>
// ===== DEFAULT ITEMS =====
const defaultItems = [
  {
    desc: `ติดตั้งระบบโซล่าเซลล์ On-Grid ขนาด 15.12 kWp

1.) แผ่นโซล่าเซลล์ ยี่ห้อ Renopi แผง N-Type 2 ด้าน แผ่นละ 630 W จำนวน 24 แผ่น รับประกัน 15 ปี
2.) Inverter ยี่ห้อ Solis S6-GR3P20K จำนวน 1 เครื่อง รับประกัน 10 ปี (สามารถซื้อประกันต่อได้ 5 ปี) โดยศูนย์บริการในประเทศ
3.) อุปกรณ์ติดตั้งแผงโซล่าเซลล์ "Kinsent" Solar Mounting Anodized 20μm (Japanese standard) รับประกัน 10 ปี
4.) ระบบไฟฟ้า: MDB Solar, Solar Cable "Lappkabel", AC Cable, MED Mesh Tray Stainless Steel, Relay Protection Coordination AC/DC
5.) ค่าดำเนินการ และค่าแรงในการติดตั้ง / ลิฟต์ เครน โฟร์คลิฟต์
6.) ดำเนินการขออนุญาตขนาน/การไฟฟ้า + รับรองโดยวิศวกรโยธาและไฟฟ้า ฟรี
7.) รับประกันงานติดตั้ง + ตรวจสอบระบบและล้างแผงโซล่าฟรี 2 ครั้ง/ปี เป็นเวลา 3 ปี (ปีถัดไปคิดค่าเซอร์วิส 0.3 บาท/วัตต์)`,
    qty: 1, price: 579600, discount: 0, vat: 7
  },
  {
    desc: `แบตเตอรี่ลิเธียม LV TOPSUN 51.2V 314Ah-G4 (LiFePO4 16 kWh)
• รับประกัน 10 ปี
• รวมการติดตั้งและเชื่อมต่อกับระบบ Inverter`,
    qty: 3, price: 68000, discount: 0, vat: 7
  }
];

let items = [];

// ===== INIT =====
function init() {
  items = defaultItems.map(i => ({...i}));
  renderItems();
}

// ===== ITEMS CRUD =====
function renderItems() {
  const tbody = document.getElementById('itemsBody');
  tbody.innerHTML = '';
  items.forEach((item, idx) => {
    const tr = document.createElement('tr');
    const lineTotal = calcLineTotal(item);
    tr.innerHTML = `
      <td><div class="row-num">${idx+1}</div></td>
      <td>
        <textarea oninput="updateItem(${idx},'desc',this.value)" rows="4" style="width:100%;min-width:250px">${escHtml(item.desc)}</textarea>
      </td>
      <td><input type="number" class="num-input" value="${item.qty}" min="0" step="any" oninput="updateItem(${idx},'qty',+this.value)" style="width:72px;text-align:right"></td>
      <td><input type="number" class="num-input" value="${item.price}" min="0" step="any" oninput="updateItem(${idx},'price',+this.value)" style="width:110px;text-align:right"></td>
      <td><input type="number" class="num-input" value="${item.discount}" min="0" step="any" oninput="updateItem(${idx},'discount',+this.value)" style="width:90px;text-align:right"></td>
      <td><input type="number" class="num-input" value="${item.vat}" min="0" max="100" step="any" oninput="updateItem(${idx},'vat',+this.value)" style="width:65px;text-align:right"></td>
      <td class="val-cell fmt-num">${fmt(lineTotal)}</td>
      <td><button class="del-btn" onclick="deleteItem(${idx})" title="ลบรายการ">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('itemCount').textContent = `${items.length} รายการ`;
}

function updateItem(idx, field, value) {
  items[idx][field] = value;
  // Update only the total cell without re-rendering everything
  const rows = document.getElementById('itemsBody').querySelectorAll('tr');
  const totalCell = rows[idx].querySelector('.val-cell');
  totalCell.textContent = fmt(calcLineTotal(items[idx]));
  document.getElementById('itemCount').textContent = `${items.length} รายการ`;
}

function addItem() {
  items.push({ desc: '', qty: 1, price: 0, discount: 0, vat: 7 });
  renderItems();
  // Focus on last textarea
  setTimeout(() => {
    const rows = document.getElementById('itemsBody').querySelectorAll('tr');
    const last = rows[rows.length - 1];
    if (last) last.querySelector('textarea').focus();
  }, 50);
}

function deleteItem(idx) {
  if (items.length <= 1) return alert('ต้องมีอย่างน้อย 1 รายการ');
  items.splice(idx, 1);
  renderItems();
}

// ===== CALCULATIONS =====
function calcLineTotal(item) {
  return (item.qty * item.price - item.discount) * (1 + item.vat / 100);
}

function calcTotals() {
  const subtotal = items.reduce((s, i) => s + (i.qty * i.price - i.discount), 0);
  const vat = items.reduce((s, i) => s + (i.qty * i.price - i.discount) * (i.vat / 100), 0);
  const total = subtotal + vat;
  return { subtotal, vat, total };
}

// ===== FORMAT =====
function fmt(n) {
  return Number(n).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== TABS =====
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='form') || (i===1 && tab==='preview'));
  });
  document.getElementById('formSection').classList.toggle('active', tab==='form');
  document.getElementById('previewSection').classList.toggle('active', tab==='preview');
  if (tab==='preview') generateQuotation();
}

// ===== GENERATE =====
function generateQuotation() {
  const quoteNo = document.getElementById('quoteNo').value;
  const quoteDate = document.getElementById('quoteDate').value;
  const sellerName = document.getElementById('sellerName').value;
  const sellerAddr = document.getElementById('sellerAddr').value;
  const sellerTax = document.getElementById('sellerTax').value;
  const sellerTel = document.getElementById('sellerTel').value;
  const buyerName = document.getElementById('buyerName').value;
  const buyerAddr = document.getElementById('buyerAddr').value;
  const terms = document.getElementById('paymentTerms').value.split('\n').filter(t=>t.trim());
  const expiry = document.getElementById('quoteExpiry').value;

  const { subtotal, vat, total } = calcTotals();

  const itemRows = items.map((item, idx) => `
    <tr>
      <td class="num">${idx+1}</td>
      <td class="desc-main">${escHtml(item.desc)}</td>
      <td class="center">${Number(item.qty).toLocaleString()}</td>
      <td class="right fmt-num">${fmt(item.price)}</td>
      <td class="right fmt-num">${item.discount > 0 ? fmt(item.discount) : '—'}</td>
      <td class="center">${item.vat}%</td>
      <td class="right fmt-num" style="font-weight:700;color:#1a3a5c">${fmt(calcLineTotal(item))}</td>
    </tr>
  `).join('');

  const termItems = terms.map(t => `<li>${escHtml(t)}</li>`).join('');

  const html = `
    <div class="q-header">
      <div>
        <div class="q-logo"><span class="eco">Eco</span><span class="solar">Solar</span></div>
        <div class="q-logo-sub">โซลาร์ราคาประหยัดเพื่อบ้านคุณ</div>
      </div>
      <div class="q-title-block">
        <h1>QUOTATION</h1>
        <div class="q-subtitle">ใบเสนอราคา</div>
        <div class="q-meta">
          <div class="q-meta-item">
            <div class="q-meta-label">เลขที่</div>
            <div class="q-meta-value">${escHtml(quoteNo)}</div>
          </div>
          <div class="q-meta-item">
            <div class="q-meta-label">วันที่</div>
            <div class="q-meta-value">${escHtml(quoteDate)}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="q-parties">
      <div class="q-party">
        <div class="q-party-label">จาก / FROM</div>
        <div class="q-party-name">${escHtml(sellerName)}</div>
        <div class="q-party-detail">${escHtml(sellerAddr)}<br>เลขผู้เสียภาษี: ${escHtml(sellerTax)} &nbsp;|&nbsp; โทร: ${escHtml(sellerTel)}</div>
      </div>
      <div class="q-party">
        <div class="q-party-label">ถึง / TO</div>
        <div class="q-party-name">${escHtml(buyerName)}</div>
        <div class="q-party-detail">${escHtml(buyerAddr)}</div>
      </div>
    </div>

    <div class="q-table-wrap">
      <table class="q-table">
        <thead>
          <tr>
            <th class="center" style="width:36px">#</th>
            <th>รายการ / Description</th>
            <th class="center" style="width:70px">จำนวน</th>
            <th class="right" style="width:110px">ราคา/หน่วย</th>
            <th class="right" style="width:90px">ส่วนลด</th>
            <th class="center" style="width:70px">VAT%</th>
            <th class="right" style="width:120px">มูลค่า (บาท)</th>
          </tr>
        </thead>
        <tbody>${itemRows}</tbody>
      </table>
    </div>

    <div class="q-totals">
      <div class="q-totals-table">
        <div class="q-totals-row">
          <span class="t-label">รวมเป็นเงิน (Subtotal)</span>
          <span class="t-value fmt-num">${fmt(subtotal)}</span>
        </div>
        <div class="q-totals-row">
          <span class="t-label">ภาษีมูลค่าเพิ่ม (VAT)</span>
          <span class="t-value fmt-num">${fmt(vat)}</span>
        </div>
        <div class="q-totals-row grand">
          <span class="t-label">จำนวนเงินรวมทั้งสิ้น</span>
          <span class="t-value fmt-num">${fmt(total)}</span>
        </div>
        <div class="q-totals-row">
          <span class="t-label">หักภาษี ณ ที่จ่าย</span>
          <span class="t-value fmt-num">0.00</span>
        </div>
        <div class="q-totals-row net">
          <span class="t-label">ยอดชำระสุทธิ</span>
          <span class="t-value fmt-num">${fmt(total)}</span>
        </div>
      </div>
    </div>

    <div class="q-bottom">
      <div class="q-terms">
        <h3>เงื่อนไขการชำระเงิน / Payment Terms</h3>
        <ul>${termItems}</ul>
        <div style="margin-top:10px;font-size:11px;color:#9e9e9e">ใบเสนอราคามีอายุ ${expiry} วัน นับจากวันที่ออก</div>
      </div>
      <div class="q-signatures">
        <h3>ลายมือชื่อ / Signatures</h3>
        <div class="q-sig-pair">
          <div class="q-sig">
            <div class="q-sig-line"></div>
            <div class="q-sig-name">${escHtml(buyerName)}</div>
            <div class="q-sig-role">(ผู้สั่งซื้อสินค้า)</div>
            <div class="q-sig-date">วันที่: ________________</div>
          </div>
          <div class="q-sig">
            <div class="q-sig-line"></div>
            <div class="q-sig-name">${escHtml(sellerName.replace('(สำนักงานใหญ่)','').trim())}</div>
            <div class="q-sig-role">(ผู้อนุมัติ / ผู้ติดตั้ง)</div>
            <div class="q-sig-date">วันที่: ________________</div>
          </div>
        </div>
      </div>
    </div>

    <div class="q-footer">
      <div class="q-footer-brand">EcoSolar — โซลาร์ราคาประหยัดเพื่อบ้านคุณ</div>
      <div class="q-footer-thanks">ขอบคุณที่ให้ความไว้วางใจ 🙏</div>
    </div>
  `;

  document.getElementById('quotationDoc').innerHTML = html;

  // Switch to preview tab if not already
  document.getElementById('formSection').classList.remove('active');
  document.getElementById('previewSection').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===1));
}

// ===== RESET =====
function resetForm() {
  if (!confirm('ล้างข้อมูลทั้งหมดและเริ่มใหม่?')) return;
  document.getElementById('quoteNo').value = 'QT-' + new Date().getFullYear() + '-001';
  document.getElementById('quoteDate').value = new Date().toLocaleDateString('th-TH');
  document.getElementById('buyerName').value = '';
  document.getElementById('buyerAddr').value = '';
  items = [{ desc: '', qty: 1, price: 0, discount: 0, vat: 7 }];
  renderItems();
  showTab('form');
}

// ===== START =====
init();
</script>
</body>
</html>
